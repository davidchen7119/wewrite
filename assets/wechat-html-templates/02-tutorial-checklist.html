<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>公众号教程清单模板</title>
  <style>
    :root{--ink:#142024;--blue:#1b6174;--sky:#dceef0;--paper:#fffefa;--line:#d6e2e2;}*{box-sizing:border-box}body{margin:0;background:#c8dce0;color:var(--ink);font-family:"PingFang SC","Noto Sans SC",sans-serif}main{max-width:760px;margin:auto;background:var(--paper);padding:46px 44px 66px}.label{display:inline-block;padding:6px 10px;background:var(--ink);color:#fff;font-size:12px;font-weight:700;letter-spacing:.08em}h1{margin:18px 0 12px;font-size:38px;line-height:1.3;letter-spacing:-.04em}.intro{font-size:18px;line-height:1.8;color:#4c5d60}.hero{width:100%;aspect-ratio:2/1;object-fit:cover;margin:26px 0 10px;border-radius:14px}.caption,.source{font-size:12px;color:#607275;line-height:1.65}.checklist{margin:32px 0;padding:0;list-style:none;border-top:1px solid var(--line)}.checklist li{padding:20px 0 20px 46px;border-bottom:1px solid var(--line);position:relative;font-size:17px;line-height:1.75}.checklist li:before{content:counter(step);counter-increment:step;position:absolute;left:0;top:20px;width:28px;height:28px;border-radius:50%;background:var(--blue);color:#fff;text-align:center;line-height:28px;font-size:13px;font-weight:700}.checklist{counter-reset:step}h2{margin:42px 0 12px;font-size:25px}.tip{padding:18px 20px;background:var(--sky);border-radius:12px;line-height:1.75}.image-brief{margin:28px 0;padding:16px;border:1px dashed #8ab0b9;color:#31535c;font-size:14px;line-height:1.7}.footer{margin-top:44px;font-size:12px;color:#607275}@media(max-width:600px){main{padding:30px 20px 50px}h1{font-size:32px}}
  </style>
</head>
<body><main data-wechat-export-root>
  <span class="label" id="label"></span><h1 id="title"></h1><p class="intro" id="intro"></p>
  <img id="cover" class="hero" alt=""><div class="caption" id="caption"></div>
  <ul class="checklist" id="steps"></ul><div class="image-brief" id="imageBrief"></div>
  <h2>发布前再过一遍</h2><div class="tip" id="tip"></div><p class="footer">HTML 公众号模板包 · 工作流参考 <a href="https://github.com/alchaincyf/huashu-design">huashu-design</a>（MIT）。</p>
</main><script>
const article={label:'可复用教程',title:'用一套模板，把文章从草稿变成可传播的图文',intro:'别把排版留到最后五分钟。先选好版式和图片位置，写作时就能同步准备素材。',cover:'https://images.unsplash.com/photo-1456324504439-367cee3b3c32?auto=format&fit=crop&w=1400&q=85',cover_alt:'写有计划的纸张和电脑',caption:'封面图示例。请替换为自己的教程截图、实拍或已授权图片。',steps:['先确定这篇文章只解决一个问题，并写出读者看完后的具体收获。','选中模板，替换标题、导语和步骤，不要先堆大段文字。','先准备一张封面和两张步骤图。每张图都要能帮助读者理解动作。','在浏览器中预览，检查手机宽度下的标题换行和图片说明。','填好宣传卡片，带着图片发到社群、朋友圈或 X。'],image_prompt:'生成一张横向教程步骤图：电脑屏幕显示文章结构草稿，旁边有编号便签纸，白绿配色，清晰、克制、没有品牌标识。',tip:'检查事实、链接、图片授权、截图里的隐私信息和公众号后台最终预览。不要为了“好看”塞进无关图片。'};
const set=(id,v)=>document.getElementById(id).textContent=v;set('label',article.label);set('title',article.title);set('intro',article.intro);const c=document.getElementById('cover');c.src=article.cover;c.alt=article.cover_alt;set('caption',article.caption);document.getElementById('steps').innerHTML=article.steps.map(x=>`<li>${x}</li>`).join('');document.getElementById('imageBrief').innerHTML=`<strong>文内配图提示词：</strong>${article.image_prompt}`;set('tip',article.tip);
</script><script src="./export-wechat-inline.js"></script><script>window.WechatInlineExporter.addCopyButton(document.querySelector('[data-wechat-export-root]'));</script></body></html>
