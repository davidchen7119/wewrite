<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><title>公众号富文本排版测试</title></head>
<body style="margin:0;background:#ffffff;color:#172321;font-family:PingFang SC,Noto Sans SC,sans-serif;">
  <section data-wechat-exported="true" style="max-width:677px;margin:0 auto;padding:32px 24px 48px;background-color:#fffefa;color:#172321;">
    <p style="margin:0 0 12px;color:#c4502f;font-size:13px;font-weight:700;letter-spacing:1.5px;line-height:20px;">排版兼容性测试</p>
    <h1 style="margin:0 0 16px;color:#172321;font-family:Songti SC,Noto Serif SC,serif;font-size:32px;font-weight:700;line-height:1.35;">这是一篇可直接粘贴到公众号的测试文章</h1>
    <p style="margin:0 0 24px;color:#43504d;font-size:17px;line-height:1.9;">请在公众号新建图文的正文编辑器中粘贴本页内容，检查标题、段落间距、引用框和列表是否仍然保留。</p>
    <div style="margin:24px 0;padding:16px 18px;border-left:4px solid #c4502f;background-color:#eee7da;color:#25322f;font-size:16px;line-height:1.8;">测试重点：复制内容不包含脚本或样式表，所有文字与区块样式都已写入元素的 <span style="font-weight:700;">style</span> 属性。</div>
    <h2 style="margin:30px 0 12px;color:#172321;font-size:22px;font-weight:700;line-height:1.45;">检查清单</h2>
    <ul style="margin:0 0 24px;padding-left:24px;color:#172321;font-size:16px;line-height:1.9;">
      <li style="margin:0 0 6px;">标题字号和字重正常</li>
      <li style="margin:0 0 6px;">引用框保留浅色背景与左侧色条</li>
      <li style="margin:0 0 6px;">列表层级与段落间距清楚</li>
    </ul>
    <p style="margin:24px 0 0;padding-top:16px;border-top:1px solid #d9d2c4;color:#66706d;font-size:13px;line-height:1.7;">图片不在这份测试页中。正式发布时，请将图片上传到公众号素材库或在编辑器内替换，避免依赖外部图片链接。</p>
  </section>
</body>
</html>
