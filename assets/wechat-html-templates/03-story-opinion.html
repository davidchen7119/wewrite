<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>公众号观点故事模板</title>
  <style>
    :root{--ink:#241914;--wine:#8f2f28;--rose:#f2e2d9;--paper:#fffaf6;--muted:#806c63}*{box-sizing:border-box}body{margin:0;background:#d9c1b3;color:var(--ink);font-family:"Songti SC","Noto Serif SC",serif}main{width:min(760px,100%);margin:auto;padding:56px 48px 70px;background:var(--paper)}.eyebrow{font-family:"PingFang SC","Noto Sans SC",sans-serif;color:var(--wine);font-size:13px;letter-spacing:.14em;font-weight:700}h1{margin:15px 0 22px;font-size:43px;line-height:1.22;letter-spacing:-.05em}.lede{margin:0 0 30px;padding-left:20px;border-left:3px solid var(--wine);font-size:20px;line-height:1.8}.cover{width:100%;aspect-ratio:2/1;object-fit:cover;filter:saturate(.78);margin:4px 0 8px}.caption{font-family:"PingFang SC","Noto Sans SC",sans-serif;font-size:12px;color:var(--muted);line-height:1.65}article{font-size:19px;line-height:2.05}article p{margin:24px 0}h2{margin:46px 0 14px;font-size:27px}.pull{margin:36px -8px;padding:26px 30px;background:var(--rose);font-size:25px;line-height:1.6}.source{margin-top:34px;padding-top:15px;border-top:1px solid #e6d4ca;font-family:"PingFang SC","Noto Sans SC",sans-serif;font-size:13px;line-height:1.75;color:var(--muted)}@media(max-width:600px){main{padding:36px 22px 54px}h1{font-size:35px}article{font-size:17px}.pull{font-size:21px;margin:30px 0}}
  </style>
</head>
<body><main data-wechat-export-root><div class="eyebrow" id="eyebrow"></div><h1 id="title"></h1><p class="lede" id="lede"></p><img id="cover" class="cover" alt=""><div class="caption" id="caption"></div><article id="body"></article><div class="source" id="source"></div></main><script>
const article={eyebrow:'一篇复盘 / 一个观点',title:'真正拉开内容差距的，不是你会不会用 AI',lede:'当所有人都能快速生成一篇文章时，读者开始更在意：你到底经历过什么，为什么值得相信。',cover:'https://images.unsplash.com/photo-1455390582262-044cdead277a?auto=format&fit=crop&w=1400&q=85',cover_alt:'手写笔记和钢笔',caption:'封面图示例。观点文章请换成能证明场景、结果或人物关系的已授权图片。',paragraphs:['上周我看了几篇同题文章。它们的结构很像，信息也没有错，但读完以后没有一句能留下来。','问题不在工具。问题是作者没有把判断交给读者。写作里真正稀缺的，是你在一个具体场景里的取舍、失败和后来改变想法的瞬间。','所以我现在写文章前，会先问自己一件事：这篇内容里有没有只有我能补上的部分？如果没有，先别写。'],pull:'让人记住你的，不是你用了什么工具，而是你把什么经验交给了读者。',image_prompt:'生成一张横向 2:1 的真实写作复盘场景：桌面上有手写修改稿、被划掉的段落和一杯冷咖啡，低饱和暖色，安静克制，没有品牌标识。',source:'图片来源：替换为你的素材来源或“AI 生成，提示词已存档”。模板工作流参考 huashu-design（MIT）。'};
const set=(id,v)=>document.getElementById(id).textContent=v;set('eyebrow',article.eyebrow);set('title',article.title);set('lede',article.lede);const c=document.getElementById('cover');c.src=article.cover;c.alt=article.cover_alt;set('caption',article.caption);document.getElementById('body').innerHTML=`<p>${article.paragraphs[0]}</p><h2>读者要的是判断</h2><p>${article.paragraphs[1]}</p><div class="pull">${article.pull}</div><div class="source"><strong>文内配图提示词：</strong>${article.image_prompt}</div><p>${article.paragraphs[2]}</p>`;set('source',article.source);
</script><script src="./export-wechat-inline.js"></script><script>window.WechatInlineExporter.addCopyButton(document.querySelector('[data-wechat-export-root]'));</script></body></html>
